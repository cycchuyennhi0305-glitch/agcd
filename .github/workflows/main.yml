name: Windows2022

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 9999

    steps:
    - name: 1. Kích hoạt RDP và Cấu hình Mật khẩu
      run: | 
        $pass = "${{ secrets.RDP_PASSWORD }}"
        if ($pass -eq "") { $pass = "P@ssword1234" }
        net user runneradmin $pass
        
        # Cấu hình hệ thống cho phép RDP
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        
        # TẮT BẢO MẬT NLA (Sửa thành Value 0) để tránh lỗi chấm đỏ khi dùng Tunnel
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
        
        # Mở Firewall cho cổng 3389
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        netsh advfirewall firewall add rule name="Allow RDP" dir=in action=allow protocol=TCP localport=3389

    - name: 2. Tải và Khởi tạo Tunnel bằng Bore
      run: |
        Write-Host "Dang tai cong cu Bore Tunnel..."
        Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile bore.zip
        Expand-Archive bore.zip -DestinationPath .
        
        Write-Host "Khoi chay Bore Tunnel vao cong 3389..."
        $env:NO_COLOR="1"
        Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -NoNewWindow -RedirectStandardOutput bore_out.log -RedirectStandardError bore_err.log

    - name: 3. Lấy Thông tin Kết nối RDP
      run: |
        Write-Host "Dang doi Bore cap phat port..."
        $retryCount = 0
        $port = $null
        
        while ($null -eq $port -and $retryCount -lt 15) {
            Start-Sleep -Seconds 4
            $logContent = ""
            
            # Copy file log ra một bản tạm để tránh lỗi Windows khóa file
            if (Test-Path bore_out.log) { Copy-Item bore_out.log temp_out.log -ErrorAction SilentlyContinue; $logContent += Get-Content temp_out.log -Raw -ErrorAction SilentlyContinue }
            if (Test-Path bore_err.log) { Copy-Item bore_err.log temp_err.log -ErrorAction SilentlyContinue; $logContent += Get-Content temp_err.log -Raw -ErrorAction SilentlyContinue }
            
            if ($logContent -match 'bore\.pub[^\d]*(\d+)') {
                $port = $matches[1]
            } elseif ($logContent -match 'remote_port[^\d]*(\d+)') {
                $port = $matches[1]
            } else {
                Write-Host "Chua co port, dang doi them... ($($retryCount + 1)/15)"
                $retryCount++
            }
        }
        
        if ($null -ne $port) {
            Write-Host "`n========================================"
            Write-Host " KET NOI RDP CUA BAN TAI:"
            Write-Host " Address : bore.pub:$port"
            Write-Host " Username: runneradmin"
            Write-Host " Password: (Secret ban da dat)"
            Write-Host "========================================`n"
        } else {
            Write-Host "=== THAT BAI: Khong the tao tunnel sau 60 giay ==="
            Write-Host "--- CHI TIET LOG OUT ---"
            if (Test-Path bore_out.log) { cat bore_out.log }
            Write-Host "--- CHI TIET LOG ERR ---"
            if (Test-Path bore_err.log) { cat bore_err.log }
            exit 1
        }

    - name: 4. Duy trì Workflow (Đã Fix lỗi Spam)
      run: |
        Write-Host "He thong RDP dang chay ngon lanh! Ban co the ket noi ngay bay gio."
        # Vòng lặp ngủ im lặng bằng PowerShell, kéo dài thời gian sống của máy ảo
        while ($true) {
            Start-Sleep -Seconds 300
            Write-Host "Ping... Workflow van dang hoat dong tot."
        }
