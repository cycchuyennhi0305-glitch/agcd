name: Windows2022

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 9999

    steps:
    - name: 1. Kích hoạt RDP và Cấu hình Mật khẩu
      run: | 
        $pass = "${{ secrets.RDP_PASSWORD }}"
        if ($pass -eq "") { $pass = "P@ssword1234" }
        net user runneradmin $pass
        
        # Cấu hình hệ thống cho phép RDP
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
        # Mở Firewall cho cổng 3389
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        netsh advfirewall firewall add rule name="Allow RDP" dir=in action=allow protocol=TCP localport=3389
        
        # Tạo file duy trì workflow
        $loopBat = @"
        @echo off
        :loop
        timeout /t 300 /nobreak
        goto loop
        "@
        $loopBat | Out-File -FilePath loop.bat -Encoding ASCII

    - name: 2. Tải và Khởi tạo Tunnel bằng Bore (Giải pháp dứt điểm)
      run: |
        Write-Host "Dang tai cong cu Bore Tunnel..."
        Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile bore.zip
        Expand-Archive bore.zip -DestinationPath .
        
        Write-Host "Khoi chay Bore Tunnel vao cong 3389..."
        # Bore là file exe độc lập, chạy rất mượt và không bị kẹt như SSH
        Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -NoNewWindow -RedirectStandardOutput bore_out.log -RedirectStandardError bore_err.log
        
        # Chờ 5 giây để Bore lấy Port từ server
        Start-Sleep -Seconds 5

    - name: 3. Lấy Thông tin Kết nối RDP
      run: |
        $logContent = ""
        # Đọc 2 file log giống như cách làm an toàn trước đó
        if (Test-Path bore_out.log) { $logContent += Get-Content bore_out.log -Raw -ErrorAction SilentlyContinue }
        if (Test-Path bore_err.log) { $logContent += Get-Content bore_err.log -Raw -ErrorAction SilentlyContinue }
        
        # Tìm cổng (port) mà server Bore cấp phát (ví dụ: remote_port=12345)
        if ($logContent -match 'remote_port=(\d+)') {
            $port = $matches[1]
            Write-Host "`n========================================"
            Write-Host " KET NOI RDP CUA BAN TAI:"
            Write-Host " Address : bore.pub:$port"
            Write-Host " Username: runneradmin"
            Write-Host " Password: (Secret ban da dat)"
            Write-Host "========================================`n"
        } else {
            Write-Error "Khong the tao tunnel. Xem chi tiet log cua Bore de biet loi:"
            Write-Host "--- LOG OUT ---"
            if (Test-Path bore_out.log) { cat bore_out.log }
            Write-Host "--- LOG ERR ---"
            if (Test-Path bore_err.log) { cat bore_err.log }
            exit 1
        }

    - name: 4. Duy trì Workflow
      run: .\loop.bat
