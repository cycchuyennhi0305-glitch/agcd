name: WindowsLatest_RDP

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
    - name: 1. Cài đặt Ngrok
      run: choco install ngrok -y

    - name: 2. Kích hoạt RDP và Cấu hình Mật khẩu
      run: | 
        $pass = "${{ secrets.RDP_PASSWORD }}"
        if ($pass -eq "") { $pass = "P@ssword1234" }
        net user runneradmin $pass
        
        # Mở khóa cho phép kết nối RDP
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        
        # Tắt NLA để tránh lỗi xác thực giao thức qua Tunnel đường truyền công cộng
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 1
        
        # Tắt TOÀN BỘ Firewall để luồng mạng thông suốt tuyệt đối
        Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False
        
        # LƯU Ý: Tuyệt đối KHÔNG restart dịch vụ TermService trên máy ảo GitHub

    - name: 3. Khởi tạo Tunnel bằng Ngrok
      run: |
        if ("${{ secrets.NGROK_AUTH_TOKEN }}" -eq "") {
          Write-Error "Thieu NGROK_AUTH_TOKEN!"
          exit 1
        }
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        Write-Host "Khoi chay Ngrok vao cong 3389..."
        Start-Process -FilePath ngrok -ArgumentList "tcp 3389 --log=ngrok.log" -NoNewWindow

    - name: 4. Lấy Thông tin Kết nối RDP
      run: |
        Write-Host "Dang doi Ngrok cap phat dia chi..."
        $retryCount = 0
        $address = $null
        
        while ($null -eq $address -and $retryCount -lt 15) {
            Start-Sleep -Seconds 4
            if (Test-Path ngrok.log) {
                Copy-Item ngrok.log temp_ngrok.log -ErrorAction SilentlyContinue
                $logContent = Get-Content temp_ngrok.log -Raw -ErrorAction SilentlyContinue
                
                if ($logContent -match 'url=(tcp://[a-zA-Z0-9.-]+:\d+)') {
                    $address = $matches[1]
                    $address = $address -replace 'tcp://', ''
                }
            }
            if ($null -eq $address) {
                Write-Host "Chua tim thay log, dang doi them... ($($retryCount + 1)/15)"
                $retryCount++
            }
        }
        
        if ($null -ne $address) {
            Write-Host "`n========================================"
            Write-Host " KET NOI RDP CUA BAN TAI:"
            Write-Host " Address : $address"
            Write-Host " Username: runneradmin"
            Write-Host " Password: (Secret ban da dat)"
            Write-Host "========================================`n"
        } else {
            Write-Host "=== THAT BAI: Khong the tao tunnel ===`n"
            if (Test-Path ngrok.log) { cat ngrok.log }
            exit 1
        }

    - name: 5. Duy trì Workflow
      run: |
        Write-Host "He thong RDP dang chay ngon lanh! Ban co the ket noi ngay bay gio."
        while ($true) {
            Start-Sleep -Seconds 300
            Write-Host "Ping... Workflow van dang hoat dong tot."
        }
