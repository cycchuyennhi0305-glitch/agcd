name: Windows2022

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 9999

    steps:
    - name: 1. Cài đặt Ngrok
      run: choco install ngrok -y

    - name: 2. Kích hoạt RDP và Cấu hình Mật khẩu
      run: | 
        $pass = "${{ secrets.RDP_PASSWORD }}"
        if ($pass -eq "") { $pass = "P@ssword1234" }
        net user runneradmin $pass
        
        # Cho phép RDP và hạ lớp bảo mật để tránh lỗi "Cannot connect"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 1
        
        # Tắt TOÀN BỘ Firewall để luồng mạng thông suốt 100%
        Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False

    - name: 3. Khởi tạo Tunnel bằng Ngrok
      run: |
        if ("${{ secrets.NGROK_AUTH_TOKEN }}" -eq "") {
          Write-Error "Thieu NGROK_AUTH_TOKEN trong Repository Secrets!"
          exit 1
        }
        # Thêm Auth Token của bạn
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
        
        Write-Host "Khoi chay Ngrok vao cong 3389..."
        Start-Process -FilePath ngrok -ArgumentList "tcp 3389 --region ap --log=ngrok.log" -NoNewWindow

    - name: 4. Lấy Thông tin Kết nối RDP (Vòng lặp an toàn)
      run: |
        Write-Host "Dang doi Ngrok cap phat dia chi..."
        $retryCount = 0
        $ngrokApi = $null
        
        # Vòng lặp kiểm tra API nội bộ của Ngrok
        while ($null -eq $ngrokApi -and $retryCount -lt 12) {
            Start-Sleep -Seconds 5
            try {
                $ngrokApi = Invoke-RestMethod http://localhost:4040/api/tunnels -ErrorAction Stop
            } catch {
                Write-Host "Chua co dia chi, dang doi them... ($($retryCount + 1)/12)"
                $retryCount++
            }
        }
        
        if ($null -ne $ngrokApi) {
            $publicUrl = $ngrokApi.tunnels.public_url
            Write-Host "`n========================================"
            Write-Host " KET NOI RDP CUA BAN TAI:"
            Write-Host " Address : $publicUrl"
            Write-Host " Username: runneradmin"
            Write-Host " Password: (Secret ban da dat)"
            Write-Host "========================================`n"
        } else {
            Write-Host "=== THAT BAI: Khong the tao tunnel ===`n"
            Write-Host "Kiem tra xem ban da add the vao tai khoan Ngrok chua nhe!"
            if (Test-Path ngrok.log) { cat ngrok.log }
            exit 1
        }

    - name: 5. Duy trì Workflow
      run: |
        Write-Host "He thong RDP dang chay ngon lanh! Ban co the ket noi ngay bay gio."
        while ($true) {
            Start-Sleep -Seconds 300
            Write-Host "Ping... Workflow van dang hoat dong tot."
        }
