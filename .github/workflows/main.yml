name: Windows2022

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on:ABCVP9
    timeout-minutes: 9999

    steps:
    - name: 1. Cài đặt Ngrok mới nhất qua Chocolatey
      run: |
        # Sử dụng choco để cài đặt ngrok giúp tránh lỗi link tải bị hỏng
        choco install ngrok -y
        
        # Tạo file duy trì workflow
        $loopBat = @"
        @echo off
        :loop
        timeout /t 300 /nobreak
        goto loop
        "@
        $loopBat | Out-File -FilePath loop.bat -Encoding ASCII

    - name: 2. Kết nối Tài khoản Ngrok
      run: |
        if ("${{ secrets.NGROK_AUTH_TOKEN }}" -eq "") {
          Write-Error "Loi: Thieu NGROK_AUTH_TOKEN trong Repository Secrets!"
          exit 1
        }
        # Ngrok v3 dùng lệnh 'config add-authtoken'
        ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: 3. Kích hoạt RDP và Cấu hình Mật khẩu
      run: | 
        $pass = "${{ secrets.RDP_PASSWORD }}"
        if ($pass -eq "") { $pass = "P@ssword1234" }
        net user runneradmin $pass
        
        # Cấu hình hệ thống cho phép RDP
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
        
        # Mở Firewall cho cổng 3389
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        netsh advfirewall firewall add rule name="Allow RDP" dir=in action=allow protocol=TCP localport=3389

    - name: 4. Khởi tạo Tunnel Ngrok (Port 3389)
      run: |
        # Chạy ngrok v3 ở chế độ nền
        Start-Process ngrok -ArgumentList "tcp 3389 --region ap"

    - name: 5. Lấy Thông tin Kết nối RDP (Có cơ chế Retry)
      run: |
        Write-Host "Dang doi Ngrok lay dia chi tunnel..."
        $retryCount = 0
        $ngrokApi = $null
        while ($null -eq $ngrokApi -and $retryCount -lt 6) {
            try {
                $ngrokApi = Invoke-RestMethod http://localhost:4040/api/tunnels -ErrorAction Stop
            } catch {
                Write-Host "Dang thu lai... ($($retryCount + 1)/6)"
                Start-Sleep -Seconds 10
                $retryCount++
            }
        }
        
        if ($null -ne $ngrokApi) {
            $publicUrl = $ngrokApi.tunnels.public_url
            Write-Host "`n========================================"
            Write-Host " KET NOI RDP CUA BAN TAI:"
            Write-Host " Address : $publicUrl"
            Write-Host " Username: runneradmin"
            Write-Host " Password: (Secret ban da dat)"
            Write-Host "========================================`n"
        } else {
            Write-Error "Khong the ket noi voi Ngrok API."
            exit 1
        }

    - name: 6. Duy trì Workflow
      run: .\loop.bat
